name: Debian Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of packages to build'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build-and-index:
    runs-on: ubuntu-latest
    container:
      image: debian:unstable
      options: --privileged
    defaults:
      run:
        shell: bash
    steps:
      - name: Install System Utilities
        run: |
          set -o pipefail
          for i in 1 2 3; do
            apt-get update
            if apt-get install -y curl git wget build-essential devscripts equivs \
                               apt-utils dpkg-dev gnupg ca-certificates rustc cargo \
                               systemd pkgconf; then
              echo "System utilities installed successfully on attempt $i."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::Failed to install system utilities after 3 attempts."
          exit 1

      - name: Install GitHub CLI
        run: |
          if ! command -v curl &>/dev/null; then
            apt-get update && apt-get install -y curl
          fi
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update && apt-get install -y gh

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Rust Toolchain
        run: |
          rustc --version
          RUST_VERSION=$(rustc --version | awk '{print $2}')
          REQUIRED="1.85"
          if [ "$(printf '%s\n' "$REQUIRED" "$RUST_VERSION" | sort -V | head -n1)" != "$REQUIRED" ]; then
            echo "::error::rustc $RUST_VERSION is too old. Some packages require >= 1.85"
            exit 1
          fi
          echo "rustc $RUST_VERSION meets minimum $REQUIRED"

      - name: Parse Queue
        id: queue
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          TARGET_PKG="${PKGS[0]}"
          REMAINING="${PKGS[@]:1}"
          
          echo "TARGET_PKG=$TARGET_PKG" >> "$GITHUB_ENV"
          echo "REMAINING_PKGS=$REMAINING" >> "$GITHUB_ENV"
          echo ">>> Building $TARGET_PKG (remaining: $REMAINING)"

      - name: Restore Rolling Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/debian
          echo ">>> Downloading existing .deb pool..."
          gh release download rolling -p "*.deb" --repo ${{ github.repository }} --dir public/debian 2>/dev/null || true

      - name: Fetch Latest Source and Build Package
        run: |
          TARGET="${{ env.TARGET_PKG }}"
          PKG_TYPE=$(grep '^TYPE=' "$TARGET/nexus.conf" | cut -d'=' -f2 | tr -d '\r')
          REPO=$(grep '^REPO=' "$TARGET/nexus.conf" | cut -d'=' -f2 | tr -d '\r')
          BRANCH=$(grep '^BRANCH=' "$TARGET/nexus.conf" | cut -d'=' -f2 | tr -d '\r' || true)
          BASE_VERSION=$(grep '^BASE_VERSION=' "$TARGET/nexus.conf" | cut -d'=' -f2 | tr -d '\r' || true)

          if [ "$PKG_TYPE" = "git" ]; then
            UPSTREAM_URL="https://github.com/${REPO}.git"
            echo ">>> Cloning $TARGET source from branch $BRANCH..."
            git clone -b "$BRANCH" "$UPSTREAM_URL" build-src

            echo ">>> Injecting Debian configuration..."
            cp -a "$TARGET/debian" build-src/

            cd build-src
            rm -f debian/compat
            chmod +x debian/rules

            echo ">>> Installing Build Dependencies..."
            mk-build-deps --install --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control

            echo ">>> Compiling Debian Package (.deb)..."
            dpkg-buildpackage -b -uc -us
            cd ..

          elif [ "$PKG_TYPE" = "deb-repackage" ]; then
            DEB_URL=$(grep '^DEB_URL=' "$TARGET/nexus.conf" | cut -d'=' -f2- | tr -d '\r' | xargs)
            DEB_URL=$(echo "$DEB_URL" | sed "s/\${VERSION}/${BASE_VERSION}/g")

            echo ">>> Downloading upstream .deb: $DEB_URL"
            curl -fsSL -o /tmp/upstream.deb "$DEB_URL"

            echo ">>> Extracting upstream .deb..."
            mkdir -p build-src
            # dpkg-deb safely extracts ANY compression format (xz, gz, zst) automatically
            dpkg-deb -x /tmp/upstream.deb build-src/
            rm -f /tmp/upstream.deb

            echo ">>> Injecting Debian metadata..."
            cp -a "$TARGET/debian" build-src/

            cd build-src
            rm -f debian/compat
            chmod +x debian/rules

            echo ">>> Installing Build Dependencies..."
            mk-build-deps --install --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control || true

            echo ">>> Repackaging Debian Package (.deb)..."
            dpkg-buildpackage -b -uc -us
            cd ..

          elif [ "$PKG_TYPE" = "tarball-repackage" ]; then
            TARBALL_URL=$(grep '^TARBALL_URL=' "$TARGET/nexus.conf" | cut -d'=' -f2- | tr -d '\r' | xargs)
            TARBALL_URL=$(echo "$TARBALL_URL" | sed "s/\${VERSION}/${BASE_VERSION}/g")

            echo ">>> Downloading upstream tarball: $TARBALL_URL"
            curl -fsSL -o /tmp/upstream_archive "$TARBALL_URL"

            echo ">>> Extracting upstream tarball..."
            mkdir -p build-src
            # tar -xf auto-detects compression (xz, bz2, gz)
            tar -xf /tmp/upstream_archive -C build-src/ --strip-components=1
            rm -f /tmp/upstream_archive

            echo ">>> Injecting Debian metadata..."
            cp -a "$TARGET/debian" build-src/

            cd build-src
            rm -f debian/compat
            chmod +x debian/rules

            echo ">>> Installing Build Dependencies..."
            mk-build-deps --install --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control || true

            echo ">>> Repackaging Debian Package (.deb)..."
            dpkg-buildpackage -b -uc -us
            cd ..

          else
            echo "::error::Unknown PKG_TYPE '$PKG_TYPE' for $TARGET"
            exit 1
          fi

          echo ">>> Moving compiled artifacts to public pool..."
          mv *.deb public/debian/

      - name: Generate APT Repository Metadata
        run: |
          cd public/debian
          
          cat > apt-release.conf << 'EOF'
          APT::FTPArchive::Release {
            Origin "Debian-Nexus";
            Label "Debian-Nexus";
            Suite "unstable";
            Codename "sid";
            Architectures "amd64";
            Components "main";
            Description "Automated Rolling Debian Repository";
          };
          EOF
          
          echo ">>> Generating Packages index..."
          apt-ftparchive packages . > Packages
          gzip -k -f Packages
          
          echo ">>> Generating Release file..."
          apt-ftparchive -c apt-release.conf release . > Release
          
          rm -f apt-release.conf

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling --repo "$REPO" --title "Debian Nexus Rolling Binaries" --prerelease

          cd public/debian
          
          retry_upload() {
            for i in 1 2 3; do
              echo "Upload attempt $i for $1"
              if gh release upload rolling "$1" --repo "$REPO" --clobber 2>&1; then
                return 0
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "::error::Upload failed after 3 attempts: $1"
            exit 1
          }

          echo ">>> Uploading APT metadata..."
          for file in Packages Packages.gz Release; do
            [ -f "$file" ] && retry_upload "$file"
          done

          echo ">>> Purging old versions and uploading new .deb artifacts..."
          for file in *.deb; do
            [ -e "$file" ] || continue
            
            PN="${file%%_*}"
            OLD_ASSETS=$(gh release view rolling --json assets --jq ".assets[].name" --repo "$REPO" | grep -E "^${PN}_.*\.deb$" || true)
            for asset in $OLD_ASSETS; do
              gh release delete-asset rolling "$asset" --repo "$REPO" -y || true
            done
            
            retry_upload "$file"
          done

      - name: Trigger Next in Queue
        if: env.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use native GITHUB_WORKSPACE instead of hardcoded /__w/ paths
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          gh workflow run "Debian Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="${{ env.REMAINING_PKGS }}"
