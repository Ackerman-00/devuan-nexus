# YAML 1.2
name: Debian Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - '*/nexus.conf'
      - '*/debian/changelog'

concurrency:
  group: debian-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  scan-and-bump:
    runs-on: ubuntu-latest
    container:
      image: debian:unstable
    defaults:
      run:
        shell: bash
    steps:
      - name: Install dependencies & GitHub CLI
        run: |
          apt-get update
          apt-get install -y git curl jq devscripts dpkg-dev ca-certificates apt-transport-https gnupg
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update && apt-get install -y gh

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Scan APIs & Bump Changelogs
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBFULLNAME: "Nexus Build Bot"
          DEBEMAIL: "actions@github.com"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'

          CHANGED_PKGS=""

          for pkg_dir in */ ; do
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            [ ! -f "$pkg_name/nexus.conf" ] && continue
            [ ! -f "$pkg_name/debian/changelog" ] && continue

            PKG_TYPE=$(grep '^TYPE=' "$pkg_name/nexus.conf" | cut -d'=' -f2 | awk '{$1=$1;print}')
            REPO=$(grep '^REPO=' "$pkg_name/nexus.conf" | cut -d'=' -f2 | awk '{$1=$1;print}')
            BRANCH=$(grep '^BRANCH=' "$pkg_name/nexus.conf" | cut -d'=' -f2 | awk '{$1=$1;print}' || true)
            BASE_VERSION=$(grep '^BASE_VERSION=' "$pkg_name/nexus.conf" | cut -d'=' -f2 | awk '{$1=$1;print}' || true)

            UPSTREAM_URL="https://github.com/${REPO}.git"
            echo "--- Scanning $pkg_name ($UPSTREAM_URL) ---"

            if [ "$PKG_TYPE" = "git" ]; then
              if [ -z "$BASE_VERSION" ]; then
                LATEST_TAG=$(curl -sSL -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$REPO/releases/latest" | jq -r .tag_name | sed 's/^v//')
                if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
                  BASE_VERSION="0.0.0"
                else
                  BASE_VERSION="$LATEST_TAG"
                fi
              fi

              LATEST_HASH=$(git ls-remote "$UPSTREAM_URL" "refs/heads/$BRANCH" | awk '{print substr($1,1,7)}')
              if [ -z "$LATEST_HASH" ]; then
                echo "  [!] Failed to fetch remote hash."
                continue
              fi

              CURR_VERSION=$(dpkg-parsechangelog -l "$pkg_name/debian/changelog" -S Version)

              if [[ "$CURR_VERSION" != *"$LATEST_HASH"* ]]; then
                echo "  [+] New commit detected! Bumping to $LATEST_HASH..."

                DATE_STR=$(date -u +%Y%m%d)
                NEW_VERSION="${BASE_VERSION}+git${DATE_STR}.${LATEST_HASH}-1"

                cd "$pkg_name"
                dch -b -v "$NEW_VERSION" -D unstable --force-distribution "Automated git bump to $LATEST_HASH"
                cd ..

                CHANGED_PKGS="$CHANGED_PKGS $pkg_name "
              else
                echo "  [-] Already up to date."
              fi

            elif [ "$PKG_TYPE" = "deb-repackage" ] || [ "$PKG_TYPE" = "tarball-repackage" ]; then
              LATEST_TAG=$(curl -sSL -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/$REPO/releases/latest" | jq -r .tag_name | sed 's/^v//')
              if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
                echo "  [!] Failed to fetch latest release for $pkg_name."
                continue
              fi

              CURR_VERSION=$(dpkg-parsechangelog -l "$pkg_name/debian/changelog" -S Version)
              CURR_UPSTREAM=$(echo "$CURR_VERSION" | sed 's/+debian.*//')

              if [ "$CURR_UPSTREAM" != "$LATEST_TAG" ]; then
                echo "  [+] New upstream release detected! Bumping $CURR_UPSTREAM → $LATEST_TAG..."
                NEW_VERSION="${LATEST_TAG}+debian1"
                cd "$pkg_name"
                dch -b -v "$NEW_VERSION" -D unstable --force-distribution "New upstream release $LATEST_TAG"
                # Update BASE_VERSION in nexus.conf so build.yml downloads the correct release
                sed -i "s/^BASE_VERSION=.*/BASE_VERSION=${LATEST_TAG}/" nexus.conf
                cd ..
                CHANGED_PKGS="$CHANGED_PKGS $pkg_name "
              else
                echo "  [-] Already up to date (upstream $LATEST_TAG)."
              fi
            fi
          done

          if [ -n "$CHANGED_PKGS" ]; then
            echo "updates_found=true" >> "$GITHUB_OUTPUT"
            echo "package_list=$CHANGED_PKGS" >> "$GITHUB_OUTPUT"

            git add .
            git commit -m "auto-update: changelog bumps $(date -u '+%Y-%m-%d')"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "updates_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Debian Build Relay
        if: steps.scan.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Debian Build Relay" \
            --ref "${{ github.ref_name }}" \
            -f package_list="${{ steps.scan.outputs.package_list }}"
